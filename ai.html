<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css?v=48">
    <script>
        (function() {
            const theme = localStorage.getItem('tb_theme') || 'dark';
            if (theme === 'light') document.documentElement.classList.add('light-mode');
        })();
    </script>
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- MathJax for rendering Equations -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        /* Animated Thinking Dots */
        .typing-dots::after {
            content: '.';
            animation: dots 1.5s steps(4, end) infinite;
            display: inline-block;
            width: 1em;
            text-align: left;
        }

        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            40% { color: #888; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .25em 0 0 #888, .5em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .25em 0 0 #888, .5em 0 0 #888; }
        }
        
        header { padding: 6px 16px; }
        header h1 { font-size: 18px; cursor: pointer; }
        .chat-layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 44px); }
        .chat-sidebar { width: 250px; background: var(--panel-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px; }
        .chat-list { flex: 1; overflow-y: auto; list-style: none; margin-top: 15px; }
        .chat-list li { padding: 12px; background: var(--zigzag-line); margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; transition: all 0.2s; color: var(--text-color); }
        .chat-list li:hover { background: var(--panel-bg-alt); }
        .chat-list li.active { border: 1px solid #9C27B0; background: rgba(37, 22, 43, 0.9); }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: transparent; }
        #chat-output { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .message { padding: 12px; border-radius: 12px; max-width: 80%; line-height: 1.5; white-space: pre-wrap; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .message p { margin-bottom: 10px; }
        .message p:last-child { margin-bottom: 0; }
        .message strong { font-weight: 900; color: #FFEB3B; }
        .message em { font-style: italic; color: #ccc; }
        .message del { text-decoration: line-through; opacity: 0.7; }
        .message code { background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        .message pre { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; overflow-x: auto; margin-top: 5px; }
        
        .user-msg { align-self: flex-end; background: rgba(156, 39, 176, 0.9); color: white; }
        .ai-msg { align-self: flex-start; background: var(--panel-bg-alt); color: var(--text-color); border: 1px solid var(--border-color); backdrop-filter: blur(4px); }
        .chat-input-area { display: flex; padding: 15px; background: var(--panel-bg-alt); gap: 10px; border-top: 1px solid var(--border-color); }

        .trash-btn { font-size: 16px; opacity: 0.6; transition: opacity 0.2s; }
        .trash-btn:hover { opacity: 1; color: #f44336; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="chat-bg">
    <header>
        <h1 onclick="location.href='index.html'">Toothbrush Larper</h1>
        <div class="controls">
            <button id="settings-btn" class="save-btn" style="background-color: #555;">⚙️ API Settings</button>
            <button id="new-chat-btn" class="save-btn rainbow-btn">+ New Chat</button>
            <button onclick="location.href='index.html'" class="save-btn" style="background-color: #3d3d3d;">Back</button>
        </div>
    </header>
    
    <div id="settings-modal" class="overlay">
        <div style="background:#1f1f1f; padding:35px; border-radius:20px; width:350px; border:1px solid #444; color:white;">
            <h3 style="margin-bottom:20px;">AI API Settings</h3>
            <p style="font-size:12px; color:#aaa; margin-bottom:15px; line-height:1.4;">By default, we use free fallback servers. If they are overloaded, you can provide your own free Groq API key for instant, ultra-fast responses.</p>
            <input type="text" id="groq-key-input" placeholder="gsk_..." style="width:100%; padding:10px; background:#121212; border:1px solid #444; color:white; border-radius:8px; margin-bottom:15px;">
            <button id="save-settings-btn" class="save-btn" style="background:#2E7D32; width:100%; padding:10px;">Save & Close</button>
            <button onclick="document.getElementById('settings-modal').style.display='none'" class="save-btn" style="background:#444; width:100%; margin-top:10px; padding:10px;">Cancel</button>
        </div>
    </div>
    <main class="chat-layout">
        <aside class="chat-sidebar"><ul id="chat-list" class="chat-list"></ul></aside>
        <section class="chat-main">
            <div id="chat-output"></div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Type a message or math problem..." autocomplete="off">
                <button id="send-btn" class="save-btn rainbow-btn">Send</button>
            </div>
        </section>
    </main>

    <script>
        let db, currentChatId = null, activeHistory = [];
        const req = indexedDB.open("AIChatDB", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("chats", { keyPath: "id" });
        req.onsuccess = e => { db = e.target.result; renderSidebar(); };

        async function renderSidebar() {
            const list = document.getElementById('chat-list'); list.innerHTML = '';
            const tx = db.transaction("chats", "readonly");
            const chats = await new Promise(r => { const req = tx.objectStore("chats").getAll(); req.onsuccess = () => r(req.result); });
            chats.sort((a,b) => b.id - a.id).forEach(chat => {
                const li = document.createElement('li'); if(chat.id === currentChatId) li.className = 'active';
                const t = document.createElement('span'); t.textContent = chat.title; t.style.flex = "1"; t.onclick = () => loadChat(chat.id);
                const del = document.createElement('span'); del.innerHTML = "🗑️"; del.className = "trash-btn";
                del.onclick = (e) => { e.stopPropagation(); deleteChat(chat.id); };
                li.append(t, del); list.appendChild(li);
            });
        }

        async function loadChat(id) {
            const tx = db.transaction("chats", "readonly");
            const chat = await new Promise(r => { const req = tx.objectStore("chats").get(id); req.onsuccess = () => r(req.result); });
            currentChatId = id; activeHistory = chat.history; display(); renderSidebar();
        }

        async function deleteChat(id) {
            if(!confirm("Delete chat?")) return;
            const tx = db.transaction("chats", "readwrite"); await tx.objectStore("chats").delete(id);
            if(currentChatId === id) { currentChatId = null; activeHistory = []; document.getElementById('chat-output').innerHTML = ''; }
            renderSidebar();
        }

        function display() {
            const out = document.getElementById('chat-output'); 
            out.innerHTML = '';
            
            activeHistory.forEach(m => {
                const d = document.createElement('div'); 
                d.className = `message ${m.role === 'user' ? 'user-msg' : 'ai-msg'}`;
                
                if (m.role === 'assistant') {
                    let processedContent = m.content.replace(/\\\(/g, '$').replace(/\\\)/g, '$').replace(/\\\[/g, '$$').replace(/\\\]/g, '$$');
                    
                    if (processedContent.includes('<!DOCTYPE html>') || processedContent.includes('Cloudflare')) {
                        d.textContent = "Error: The AI server timed out responding to your request.";
                    } else {
                        d.innerHTML = marked.parse(processedContent);
                    }
                } else {
                    d.textContent = m.content;
                }
                out.appendChild(d);
            });
            out.scrollTop = out.scrollHeight;
            
            if (window.MathJax) {
                MathJax.typesetPromise([out]).catch((err) => console.log("MathJax error:", err.message));
            }
        }

        async function send() {
            const input = document.getElementById('user-input'); 
            const val = input.value.trim(); 
            if(!val) return;

            if(!currentChatId) currentChatId = Date.now();
            activeHistory.push({role:'user', content:val}); 
            input.value = ''; 
            display();

            const out = document.getElementById('chat-output');
            const thinkingBubble = document.createElement('div');
            thinkingBubble.className = "message ai-msg";
            thinkingBubble.id = "temp-thinking";
            thinkingBubble.innerHTML = "<span style='color: #888; font-style: italic;'>Thinking<span class='typing-dots'></span></span>";
            out.appendChild(thinkingBubble);
            out.scrollTop = out.scrollHeight;

            const sysPrompt = "Use Markdown formatting. Use $...$ for inline math and $$...$$ for block math.";
            let fullText = null;

            // 1. Try Groq API if Key Exists
            const groqKey = localStorage.getItem('tb_groq_key');
            if (groqKey) {
                try {
                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "llama3-8b-8192",
                            messages: [{role: "system", content: sysPrompt}, ...activeHistory.slice(-4)]
                        })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        fullText = data.choices[0].message.content;
                    }
                } catch(e) { console.warn("Groq fetch failed", e); }
            }

            // 2. Model Failover System using POST
            if (!fullText) {
                const modelsToTry = ['openai', 'qwen', 'mistral', 'llama', 'search'];
                for (let model of modelsToTry) {
                    try {
                        const res = await fetch("https://text.pollinations.ai/openai", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                model: model,
                                messages: [{role: "system", content: sysPrompt}, ...activeHistory.slice(-4)]
                            })
                        });
                        if (!res.ok) continue; 
                        
                        const data = await res.json();
                        if (data && data.choices && data.choices.length > 0) {
                            fullText = data.choices[0].message.content;
                            break;
                        }
                    } catch (e) { console.warn(`Model ${model} failed to connect.`); }
                }
            }

            if (!fullText) {
                if (document.getElementById('temp-thinking')) document.getElementById('temp-thinking').remove();
                const d = document.createElement('div'); 
                d.className = "message ai-msg";
                d.style.color = "#f44336";
                d.textContent = "Error: All AI servers are currently overloaded. Please try again in a minute.";
                out.appendChild(d);
                return;
            }
                
            document.getElementById('temp-thinking').remove();

            const d = document.createElement('div'); 
            d.className = "message ai-msg";
            out.appendChild(d);

            const words = fullText.match(/\S+|\s+/g) || [];
            let currentText = "";
            let i = 0;

            function typeWord() {
                if (i < words.length) {
                    currentText += words[i];
                    let processed = currentText.replace(/\\\(/g, '$').replace(/\\\)/g, '$').replace(/\\\[/g, '$$').replace(/\\\]/g, '$$');
                    d.innerHTML = marked.parse(processed);
                    out.scrollTop = out.scrollHeight;
                    i++;
                    setTimeout(typeWord, 20); 
                } else {
                    activeHistory.push({role:'assistant', content:fullText});
                    const tx = db.transaction("chats", "readwrite");
                    tx.objectStore("chats").put({id: currentChatId, title: activeHistory[0].content.substring(0,25), history: activeHistory});
                    renderSidebar();
                    
                    if (window.MathJax) {
                        MathJax.typesetPromise([d]).catch((err) => console.log(err.message));
                    }
                }
            }
            typeWord(); 
        }

        document.getElementById('send-btn').onclick = send;
        document.getElementById('user-input').onkeypress = e => { if(e.key === 'Enter') send(); };
        document.getElementById('new-chat-btn').onclick = () => { currentChatId = null; activeHistory = []; document.getElementById('chat-output').innerHTML = ''; renderSidebar(); };
        
        // Settings Logic
        document.getElementById('settings-btn').onclick = () => {
            document.getElementById('groq-key-input').value = localStorage.getItem('tb_groq_key') || '';
            document.getElementById('settings-modal').style.display = 'flex';
        };
        document.getElementById('save-settings-btn').onclick = () => {
            const val = document.getElementById('groq-key-input').value.trim();
            if (val) localStorage.setItem('tb_groq_key', val);
            else localStorage.removeItem('tb_groq_key');
            document.getElementById('settings-modal').style.display = 'none';
        };
    </script>
</body>
</html>
