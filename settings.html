<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings - Toothbrush</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #1a1a1a;
            background-image: linear-gradient(135deg,#1f1f1f 25%,transparent 25%),linear-gradient(225deg,#1f1f1f 25%,transparent 25%),linear-gradient(45deg,#1f1f1f 25%,transparent 25%),linear-gradient(315deg,#1f1f1f 25%,transparent 25%);
            background-position: 40px 0,40px 0,0 0,0 0;
            background-size: 80px 80px;
            animation: moveBackground 40s linear infinite;
            margin: 0; overflow: hidden; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes moveBackground {
            to { background-position: 540px 500px, 540px 500px, 500px 500px, 500px 500px; }
        }
        .modal-box {
            background: #1a1a1a; padding: 24px; border-radius: 18px;
            width: 500px; max-width: 95vw;
            border: 2px solid #5fc772; text-align: center;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }
        .modal-box h2 { color: #5fc772; margin: 0 0 20px 0; font-size: 24px; }
        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            background: #222; padding: 12px 18px; border-radius: 12px; border: 1px solid #444;
            margin-bottom: 12px;
        }
        .setting-label { color: #fff; font-size: 16px; font-weight: bold; }
        
        /* Toggle Switch */
        .toggle-switch {
            position: relative; width: 50px; height: 26px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #f44336; transition: .3s; border-radius: 26px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #4CAF50; }
        input:checked + .slider:before { transform: translateX(24px); }

        .action-btn {
            padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
            font-weight: bold; color: #fff; font-size: 14px;
            transition: transform 0.15s, filter 0.15s;
        }
        .action-btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .back-btn { background: #3d3d3d; border: 1px solid #555; margin-top: 10px; width: 100%; padding: 12px; font-size: 16px; }
        
        .custom-select {
            background: #333; color: white; border: 1px solid #555;
            padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="modal-box">
        <h2>⚙️ Settings</h2>
        
        <div class="setting-row">
            <span class="setting-label">Enable Cookie Game</span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-cookie-game" checked>
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="setting-row">
            <span class="setting-label">Recents Item Amounts:</span>
            <select id="recents-limit" class="custom-select">
                <option value="3">3</option>
                <option value="5">5 (Default)</option>
                <option value="10">10</option>
                <option value="unlimited">Unlimited</option>
            </select>
        </div>


        <div class="setting-row">
            <span class="setting-label">Reset Progress</span>
            <button class="action-btn" style="background: #b71c1c;" id="btn-reset-stats">Reset Cookie Stats</button>
        </div>

        <div style="margin-top: 15px;">
            <a href="tutorial.pdf" target="_blank" style="color: #2196F3; text-decoration: none; font-weight: bold; font-size: 16px;">Tutorial Here</a>
        </div>

        <button class="action-btn back-btn" onclick="location.href='index.html'">Back to Home</button>
    </div>

    <script>
        // Cookie Game Toggle
        const toggleCookie = document.getElementById('toggle-cookie-game');
        const cookieDisabled = localStorage.getItem('tb_cookie_disabled') === 'true';
        toggleCookie.checked = !cookieDisabled;
        toggleCookie.addEventListener('change', (e) => {
            localStorage.setItem('tb_cookie_disabled', !e.target.checked);
        });

        // Recents Limit
        const recentsLimit = document.getElementById('recents-limit');
        recentsLimit.value = localStorage.getItem('tb_recents_limit') || '5';
        recentsLimit.addEventListener('change', (e) => {
            localStorage.setItem('tb_recents_limit', e.target.value);
            // Also trim the array if necessary
            let limit = e.target.value === 'unlimited' ? Infinity : parseInt(e.target.value);
            let recents = JSON.parse(localStorage.getItem('tb_recents') || '[]');
            if (recents.length > limit) {
                recents.length = limit;
                localStorage.setItem('tb_recents', JSON.stringify(recents));
            }
        });

        // Reset Stats
        document.getElementById('btn-reset-stats').onclick = () => {
            if (confirm('This will erase ALL cookie game data (money, upgrades, stats, discoveries). Are you sure?')) {
                const keys = ['tb_cookie_save', 'tb_cookie_stats', 'tb_cookie_discoveries'];
                keys.forEach(k => localStorage.removeItem(k));
                alert('All cookie data has been reset!');
            }
        };

    </script>
</body>
</html>
