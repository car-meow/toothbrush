<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using a more reliable CDN for PeerJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            background-image: linear-gradient(135deg, #1f1f1f 25%, transparent 25%), linear-gradient(225deg, #1f1f1f 25%, transparent 25%), linear-gradient(45deg, #1f1f1f 25%, transparent 25%), linear-gradient(315deg, #1f1f1f 25%, transparent 25%);
            background-position: 40px 0, 40px 0, 0 0, 0 0;
            background-size: 80px 80px;
            animation: moveBg 40s linear infinite;
        }
        @keyframes moveBg { from { background-position: 40px 0; } to { background-position: 540px 500px; } }

        .chat-msg {
            padding: 12px 18px; border-radius: 15px; background: rgba(0,0,0,0.4);
            border: 4px solid; max-width: 80%; margin-bottom: 10px; color: white;
        }

        .status-bar {
            position: fixed; bottom: 10px; left: 10px; font-size: 10px;
            color: #888; display: flex; align-items: center; gap: 5px;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #f44336; }

        .pin-input-large {
            font-size: 28px; text-align: center; letter-spacing: 5px; background: #121212;
            border: 2px solid #333; color: white; width: 100%; border-radius: 12px; padding: 15px;
        }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <header>
        <h1 onclick="location.href='index.html'">Toothbrush Chat</h1>
        <div id="room-header-info" style="display:none; font-weight:bold;">
            <span id="display-room-name"></span> | <span id="display-pin"></span>
        </div>
        <div class="controls">
            <button id="disband-btn" class="save-btn" style="background:#B71C1C; display:none;">Disband</button>
            <button onclick="location.href='index.html'" class="save-btn" style="background:#555;">Back</button>
        </div>
    </header>

    <!-- Home Screen -->
    <main id="chat-home" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:85vh;">
        <div style="background:#1f1f1f; padding:40px; border-radius:20px; border:1px solid #333; text-align:center; width:350px;">
            <h2 style="margin-bottom:20px;">Enter PIN</h2>
            <input type="text" id="pin-entry" class="pin-input-large" placeholder="000000" maxlength="6">
            <div id="pin-error" style="color:#f44336; margin-top:10px; display:none; font-size:13px;">Room not found. Make sure the Host is online!</div>
            <button id="join-btn" class="save-btn" style="background:#2E7D32; width:100%; margin-top:20px; height:50px;">Join Room</button>
            <div style="margin:20px 0; color:#555; font-size:12px;">— OR —</div>
            <button id="open-host-panel" class="save-btn" style="background:rgba(255,255,255,0.05); border:1px solid #444; width:100%;">Host Private Room</button>
        </div>
    </main>

    <!-- Host Modal -->
    <div id="host-modal" class="overlay">
        <div style="background:#1f1f1f; padding:30px; border-radius:15px; width:350px; border:1px solid #333;">
            <h3 style="margin-bottom:15px;">Host New Room</h3>
            <input type="text" id="host-name-input" placeholder="Room Name" style="margin-bottom:10px; width:100%;">
            <input type="text" id="host-pin-input" placeholder="6-Digit PIN" maxlength="6" style="width:100%;">
            <button id="start-host-btn" class="save-btn" style="background:#2E7D32; width:100%; margin-top:15px;">Start Room</button>
            <button onclick="document.getElementById('host-modal').style.display='none'" class="save-btn" style="background:#444; width:100%; margin-top:8px;">Cancel</button>
        </div>
    </div>

    <!-- Active Chat Room -->
    <main id="chat-room" style="display:none; flex-direction:column; height:calc(100vh - 70px);">
        <div id="messages" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:5px;"></div>
        <div style="padding:20px; background:#1f1f1f; display:flex; gap:10px; border-top:1px solid #333;">
            <input type="text" id="msg-input" placeholder="Type a message..." style="flex:1; background:#121212; border:1px solid #333; color:white; padding:12px; border-radius:8px;">
            <button id="send-btn" class="save-btn" style="background:#2E7D32;">Send</button>
        </div>
    </main>

    <div class="status-bar">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">Connecting to network...</span>
    </div>

    <script>
        // --- Identity & Global State ---
        const colorMap = {"#F44336":"Crimson","#E91E63":"Rose","#9C27B0":"Amethyst","#673AB7":"Indigo","#2196F3":"Azure","#00BCD4":"Cyan","#009688":"Teal","#4CAF50":"Leaf","#8BC34A":"Lime","#FFEB3B":"Gold","#FF9800":"Orange","#795548":"Cedar","#607D8B":"Steel","#636B2F":"Olive","#D4E157":"Pear","#26C6DA":"Sky"};
        const colors = Object.keys(colorMap);
        let myColor = colors[Math.floor(Math.random()*colors.length)];
        let myName = colorMap[myColor] + "_" + Math.floor(Math.random()*999);
        
        let peer = null, conn = null, isHost = false, connections = [];
        const ID_PREFIX = "tb-v7-"; // New version prefix

        // --- Network Status Helpers ---
        function updateStatus(type, msg) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            txt.textContent = msg;
            if(type === 'ready') dot.style.background = '#4CAF50';
            if(type === 'loading') dot.style.background = '#FFEB3B';
            if(type === 'error') dot.style.background = '#f44336';
        }

        // --- Start Peer Engine ---
        function initPeer(customId = null) {
            updateStatus('loading', 'Opening signal line...');
            if (peer) peer.destroy();
            
            peer = new Peer(customId, {
                debug: 1,
                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] }
            });

            peer.on('open', (id) => {
                updateStatus('ready', isHost ? 'Room Live' : 'Network Ready');
                if (isHost) {
                    setupRoomUI(document.getElementById('host-name-input').value, document.getElementById('host-pin-input').value);
                } else if (customId === null) {
                    // This was a joiner initialization, now proceed to connect
                    performConnect();
                }
            });

            peer.on('connection', (c) => {
                c.on('open', () => {
                    if (isHost) {
                        connections.push(c);
                        c.send({type: 'room-info', name: document.getElementById('display-room-name').textContent, pin: document.getElementById('display-pin').textContent});
                    }
                });
                c.on('data', (data) => handleData(data, c));
            });

            peer.on('error', (err) => {
                updateStatus('error', 'Error: ' + err.type);
                if (err.type === 'unavailable-id') alert("PIN is busy! Try a different one.");
                if (err.type === 'peer-unavailable') showPinError();
            });
        }

        // --- Host Actions ---
        document.getElementById('open-host-panel').onclick = () => document.getElementById('host-modal').style.display='flex';
        
        document.getElementById('start-host-btn').onclick = () => {
            const name = document.getElementById('host-name-input').value.trim();
            const pin = document.getElementById('host-pin-input').value.trim();
            if(name && pin.length === 6) {
                isHost = true;
                initPeer(ID_PREFIX + pin);
            } else { alert("Enter Name and 6-Digit PIN"); }
        };

        // --- Join Actions ---
        document.getElementById('join-btn').onclick = () => {
            const pin = document.getElementById('pin-entry').value.trim();
            if(pin.length === 6) {
                isHost = false;
                initPeer(); // Initialize with random ID first
            }
        };

        function performConnect() {
            const pin = document.getElementById('pin-entry').value.trim();
            updateStatus('loading', 'Searching for room...');
            conn = peer.connect(ID_PREFIX + pin, { reliable: true });

            conn.on('open', () => {
                updateStatus('ready', 'Connected to Room');
                conn.send({type: 'join', name: myName, color: myColor});
            });
            conn.on('data', handleData);
            
            setTimeout(() => {
                if (!conn.open) showPinError();
            }, 7000);
        }

        function handleData(data, sender) {
            if (data.type === 'msg') appendMessage(data.name, data.color, data.text);
            if (data.type === 'room-info') setupRoomUI(data.name, data.pin);
            if (data.type === 'disband') { alert("Room Disbanded"); location.reload(); }
            if (data.type === 'kick') { alert("You have been kicked"); location.reload(); }
            
            if (isHost && data.type === 'join') {
                sender.metadata = { name: data.name };
                appendMessage("System", "#777", data.name + " joined.");
                connections.forEach(c => { if(c.open && c.peer !== sender.peer) c.send({type:'msg', name:'System', color:'#777', text: data.name + " joined."}); });
            }
        }

        // --- Core UI & Logic ---
        function setupRoomUI(name, pin) {
            document.getElementById('chat-home').style.display = 'none';
            document.getElementById('host-modal').style.display = 'none';
            document.getElementById('chat-room').style.display = 'flex';
            document.getElementById('room-header-info').style.display = 'block';
            document.getElementById('display-room-name').textContent = name;
            document.getElementById('display-pin').textContent = pin;
            if(isHost) document.getElementById('disband-btn').style.display = 'block';
        }

        function appendMessage(name, color, text) {
            const area = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = "chat-msg";
            div.style.borderColor = color;
            div.style.alignSelf = (name === myName) ? "flex-end" : "flex-start";
            div.innerHTML = `<div style="font-size:10px; font-weight:bold; color:${color}; cursor:pointer;" onclick="kickUser('${name}')">${name}</div><div>${text}</div>`;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val) return;
            appendMessage(myName, myColor, val);
            const p = {type: 'msg', name: myName, color: myCo
