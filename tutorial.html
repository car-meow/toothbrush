<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
    <style>
        header { padding: 6px 16px; }
        header h1 { font-size: 18px; }
    </style>
</head>
<body>
    <header>
        <h1 onclick="location.href='index.html'" style="cursor:pointer">Toothbrush Tutorial</h1>
        <div class="controls">
            <button onclick="if(confirm('This will erase ALL cookie game data (money, upgrades, stats, discoveries). Are you sure?')){const keys=['tb_cookie_save','tb_cookie_stats','tb_cookie_discoveries'];keys.forEach(k=>localStorage.removeItem(k));alert('All cookie data has been reset!');}" class="save-btn" style="background-color:#b71c1c;">Reset Cookie Stats</button>
            <button onclick="location.href='index.html'" class="save-btn" style="background-color:#3d3d3d;">Back</button>
        </div>
    </header>
    
    <main style="background:#333;">
        <embed src="tutorial.pdf" type="application/pdf" width="100%" height="100%">
    </main>
</body>
</html>
