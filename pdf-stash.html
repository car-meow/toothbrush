<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stash Reader</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* This makes the PDF fill the entire screen below the header */
        .pdf-container {
            flex: 1;
            width: 100%;
            height: 100%;
            background-color: #333;
            display: flex;
            flex-direction: column;
        }
        embed {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Unblocked Games</h1>
        <nav class="top-nav">
            <a href="index.html" class="nav-btn">Play Games</a>
            <a href="stash.html" class="nav-btn">List Stash</a>
            <a href="pdf-stash.html" class="nav-btn" style="border-bottom: 2px solid #2196F3;">PDF Reader</a>
        </nav>
    </header>

    <main class="pdf-container">
        <!-- This embeds your PDF file directly into the webpage -->
        <embed src="stash.pdf" type="application/pdf">
    </main>
</body>
</html>
