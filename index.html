<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css?v=26">
    <style>
        /* --- Zigzag Background & Animation --- */
        body {
            background-color: #1a1a1a;
            background-image:  linear-gradient(135deg, #1f1f1f 25%, transparent 25%), linear-gradient(225deg, #1f1f1f 25%, transparent 25%), linear-gradient(45deg, #1f1f1f 25%, transparent 25%), linear-gradient(315deg, #1f1f1f 25%, transparent 25%);
            background-position:  40px 0, 40px 0, 0 0, 0 0;
            background-size: 80px 80px;
            background-repeat: repeat;
            animation: moveBackground 40s linear infinite;
            display: flex; flex-direction: column; height: 100vh; width: 100vw; margin: 0; overflow: hidden;
        }
        @keyframes moveBackground {
            from { background-position: 40px 0, 40px 0, 0 0, 0 0; }
            to { background-position: 540px 500px, 540px 500px, 500px 500px, 500px 500px; }
        }

        .home-container { display: flex; flex-direction: column; justify-content: space-between; flex: 1; padding-bottom: 8vh; position: relative; z-index: 5; }
        .title-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .home-title { font-size: 80px; color: #ffffff; text-shadow: 4px 4px 15px rgba(0, 0, 0, 0.8); margin: 0; letter-spacing: 2px; }
        .home-splash { font-size: 20px; font-style: italic; color: #FFEB3B; font-weight: bold; text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8); margin-top: 10px; text-align: center; }

        .button-row { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .home-btn { font-size: 22px; padding: 15px 40px; border-radius: 12px; }

        /* --- UI & Modals --- */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 20000; align-items: center; justify-content: center; }
        .cookie-modal-box { background: #1f1f1f; padding: 30px; border-radius: 20px; width: 600px; max-width: 90vw; max-height: 85vh; border: 2px solid #2196F3; text-align: center; display: flex; flex-direction: column; overflow: hidden; }
        
        #shop-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; overflow-y: auto; padding: 10px; margin: 15px 0; }
        .shop-cat { grid-column: span 2; color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #333; padding: 10px 0 5px 0; text-align: left; }
        .shop-item { background: #252525; padding: 12px; border-radius: 12px; border: 1px solid #444; text-align: left; display: flex; flex-direction: column; justify-content: space-between; }
        .item-name { color: #2196F3; font-weight: bold; font-size: 14px; }
        .item-desc { color: #aaa; font-size: 11px; margin: 6px 0; line-height: 1.3; height: auto; overflow: visible; }
        .item-cost { color: #FFEB3B; font-weight: bold; font-size: 12px; }

        .cps-display { font-size: 16px; color: #FFF59D; margin-left: 10px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .incinerate-btn { background-color: #B71C1C !important; color: white !important; grid-column: span 2; margin-top: 10px; border: 2px solid #ef5350 !important; font-size: 14px !important; }

        .golden-cookie { position: fixed; width: 160px; height: 160px; object-fit: contain; z-index: 999; cursor: pointer; filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8)); }
        .floating-bucks { position: fixed; color: #4CAF50; font-weight: bold; font-size: 28px; z-index: 1001; pointer-events: none; animation: float-up 1.5s ease-out forwards; }
        @keyframes float-up { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -120px) scale(1.5); opacity: 0; } }

        #effects-container { position: fixed; top: 20px; right: 25px; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; z-index: 1000; pointer-events: none; }
        .effect-item { background: rgba(31, 31, 31, 0.9); border: 2px solid #2196F3; padding: 8px 12px; border-radius: 10px; display: flex; flex-direction: column; align-items: flex-end; }
        .effect-name { font-size: 10px; font-weight: bold; color: #2196F3; text-transform: uppercase; }
        .effect-timer { font-size: 16px; font-weight: bold; color: white; }
    </style>
</head>

    <div class="home-container">
        <div class="title-area">
            <h1 class="home-title">Toothbrush</h1>
            <span id="splash-text" class="home-splash"></span>
        </div>

        <div class="button-row">
            <button onclick="location.href='games.html'" class="save-btn rainbow-btn home-btn">Games</button>
            <button onclick="location.href='ai.html'" class="save-btn home-btn" style="background-color: #f57c00;">AI Chat</button>
            <button id="proxy-btn" class="save-btn home-btn" style="background-color: #00BCD4;">Proxy</button>
            <button onclick="location.href='chat.html'" class="save-btn home-btn" style="background-color: #9C27B0;">Chat Room</button>
            <button onclick="location.href='tutorial.html'" class="save-btn home-btn" style="background-color: #5fc772;">Tutorial</button>
        </div>

    <!-- Modals -->
    <div id="stats-modal" class="overlay">
        <div class="cookie-modal-box" style="border-color: #FFD700; width: 400px;">
            <h2 style="color:#FFD700; margin-bottom:10px;">Cookie Statistics</h2>
            <h1 id="stats-total" style="color:white; margin: 10px 0; font-size: 28px;">Total 0 Cookies</h1>
            <div id="stats-list" style="background:#121212; padding:15px; border-radius:10px; border:1px solid #333; text-align: left; max-height: 300px; overflow-y: auto;"></div>
            <button onclick="closeStatsMenu()" class="save-btn" style="background:#2196F3; width:100%; margin-top: 10px;">Okay</button>
        </div>
    </div>

    <div id="shop-modal" class="overlay">
        <div class="cookie-modal-box">
            <h2 style="color:#2196F3; margin-bottom:10px;">Toothbrush Shop</h2>
            <div id="shop-list"></div>
            <button onclick="closeShop()" class="save-btn" style="background:#444; width:100%; margin-top:15px;">Close Shop</button>
        </div>
    </div>

    <div id="tut-overlay" class="overlay">
        <div style="background:#1f1f1f; padding:30px; border-radius:15px; width:450px; border:2px solid #2196F3; text-align:center;">
            <h2 style="color: #2196F3; margin-bottom: 15px;">Welcome!</h2>
            <div id="tut-text" style="color:#eee; margin-bottom:20px; line-height:1.6;">Welcome to Toothbrush! This tutorial will show you around. Click on one of the tabs at the bottom to get started.</div>
            <button id="tut-btn" class="save-btn" style="background-color: #2196F3; width: 100%;">Got it!</button>
        </div>
    </div>

    <script>
        const splashes = ["\"Assisted by Jayden!\"", "\"No, please don't close my ta-\"", "\"Wait, wait, I was about to finish the level!\"",
            "\"Prompted to perfection.\"", "\"ALT+F4: The ultimate speedrun tactic.\"", "\"My AI solved the math, I solved the level.\"",
            "\"High scores > GPA.\"", "\"Is it lag, or just the school WiFi?\"", "\"The teacher is coming, hit the Pink button!\"",
            "\"Database authorized.\"", "\"Saving your progress... hopefully.\"", "\"Not a bug, it's a feature.\"",
            "\"Llama-3 made me do it.\"", "\"Powered by pure procrastination.\"", "\"100% human-ish.\"",
            "\"Linewize can't see this.\"", "\"The ultimate study break.\"", "\"Just one more level before the bell.\"",
            "\"0% AI hallucinations, 100% gaming.\"", "\"Your high score is in the database.\"", "\"Strictly for educational purposes...\"",
            "\"Does this count as computer science?\"", "\"Bypassing the boredom.\"", "\"Infinite storage, finite time.\"",
            "\"Don't forget to backup!\"", "\"Restoring sanity, one game at a time.\"", "\"Calculated risks and heavy prompts.\"",
            "\"The AI knows the way.\"", "\"More tabs, more problems.\"", "\"Stealth mode engaged.\"",
            "\"Drive Mad? More like Drive Focused.\"", "\"Everything is unblocked if you try hard enough.\"", "\"Learning to code by playing games.\"",
            "\"Browser-based bliss.\"", "\"The stash is never empty.\"", "\"Level 99 Procrastinator.\"",
            "\"Prompt: 'Make me better at this game'.\"", "\"Error 404: Homework not found.\"", "\"Check your permissions.\"",
            "\"IndexedDB is my best friend.\"", "\"About:blank? Nothing to see here.\"", "\"The code is clean, the high score is not.\"",
            "\"Speedrunning through the semester.\"", "\"Logic applied, levels cleared.\"", "\"The AI said I should take a break.\"",
            "\"One file to rule them all.\"", "\"It's basically a digital library.\"", "\"A student's best kept secret.\"",
            "\"Don't close the lid yet!\"", "\"Frames per second > words per minute.\"", "\"GPT-4o approved.\"",
            "\"Your progress is persistent.\"", "\"Toothbrush Tutorial is mandatory reading.\"", "\"The sidebar of secrets.\"",
            "\"Cloak active. Icons changed.\"", "\"Memory leak? Never heard of her.\"", "\"HTML5: The future of study hall.\"",
            "\"Wait, did I save?\"", "\"The AI is my co-pilot.\"", "\"Simulating success.\"",
            "\"Pixel-perfect procrastination.\"", "\"Unblocked and unbothered.\"", "\"School computers are just gaming rigs in disguise.\"",
            "\"Loading a better reality.\"", "\"The Cloak button is your shield.\"", "\"Database synced.\"",
            "\"One prompt away from victory.\"", "\"Gaming is a soft skill.\"", "\"The math adds up.\"",
            "\"Why study when you can speedrun?\"", "\"Securely can't see about:blank.\"", "\"A collection of digital treasures.\"",
            "\"AI: 'I suggest playing 2048'.\"", "\"Minimalist interface, maximalist fun.\"", "\"The stash is legendary.\"",
            "\"Your secret is safe with the browser.\"", "\"Click to continue.\"", "\"The bell doesn't dismiss you, I do.\"",
            "\"Context window: Infinite.\"", "\"The PDF is the manual.\"", "\"Optimized for low-end Chromebooks.\"",
            "\"Your saves are in the cloud-ish.\"", "\"Toothbrush: The home of the bored.\"", "\"Synthesizing high scores.\"",
            "\"The AI isn't cheating, it's 'assisting'.\"", "\"Save states are a human right.\"", "\"Don't let the tab timeout!\"",
            "\"The perfect distraction.\"", "\"Bypassing the mundane.\"", "\"Strictly local storage.\"",
            "\"The UI is polished, the games are not.\"", "\"A masterclass in distraction.\"", "\"Wait, I actually need to solve this.\"",
            "\"The AI wrote the code, you play the game.\"", "\"Everything is fine.\"", "\"The final boss of the school year.\"",
            "\"Your progress is our priority.\"", "\"Hardcoded for fun.\"", "\"The stash is ultimate for a reason.\"",
            "\"READ the TUTORIAL!\"", "\"Dead.\"", "\"Wow. Just... wow.\"", "\"Honorable mention: Ctrl+W.\"", "\"Wait, this actually works?.\"", "\"Testing, testing, 123\"", "\"Can someone buy me Starbucks? Please?\"",
            "\"Never underestimate the guy who writes the splash text! Who is also the dev!\"", "\"Thanks for using Toothbrush!\"", "\"Also try 55gms.app!\"", "\"Why is Classroom Center down..?\"",
            "\"Master, I'm hungry\"", "\"Yo Dhruva, wassup? Join the chat room!\"", "\"No food for you! Now be a good boy and stand in the corner.\"", "\"Iso bottom frags\""];

        const cookieTypes =[
            { id: 'nebula', name: 'Nebula', value: 10000000, chance: 1000, quote: "Woah, is that a portal to space?", img: 'Cookies/nebula.png', css: 'aura-nebula' },
            { id: 'golden', name: 'Golden Cookie', value: 1000000, chance: 300, quote: "Thanks, Grandma!", img: 'Cookies/golden.png', css: 'aura-golden' },
            { id: 'sugar', name: 'Sugar', value: 200000, chance: 50, quote: "So sweet, my teeth burn!", img: 'Cookies/sugar.png', css: 'aura-sugar' },
            { id: 'smore', name: "S'more", value: 50000, chance: 35, quote: "Fresh from the campfire!", img: 'Cookies/smore.png', css: 'aura-smore' },
            { id: 'chocolate', name: 'Chocolate', value: 10000, chance: 25, quote: "Are you sure you didn't put a brownie in the cookie cutter?", img: 'Cookies/chocolate.png', css: 'aura-chocolate' },
            { id: 'snickerdoodle', name: 'Snickerdoodle', value: 4000, chance: 20, quote: "Soft AND cinnamony- what's not to like?", img: 'Cookies/snickerdoodle.png', css: 'aura-snickerdoodle' },
            { id: 'peanut_butter', name: 'Peanut Butter', value: 300, chance: 15, quote: "Ooooh, my favorite!", img: 'Cookies/peanut_butter.png', css: 'aura-peanut' },
            { id: 'cashew', name: 'Cashew', value: 100, chance: 10, quote: "Hope you're having a good day!", img: 'Cookies/cashew.png', css: 'aura-cashew' },
            { id: 'oatmeal_raisin', name: 'Oatmeal Raisin', value: 50, chance: 5, quote: "An under-appreciated classic.", img: 'Cookies/oatmeal_raisin.png', css: 'aura-oatmeal' },
            { id: 'chocolate_chip', name: 'Chocolate Chip', value: 21, chance: 3, quote: "You can't go wrong with the basics.", img: 'Cookies/chocolate_chip.png', css: 'aura-basic' }
        ];

        // --- GAME STATE ---
        let cookieBucks = parseFloat(localStorage.getItem('tb_cookie_bucks') || '0');
        let swagPoints = parseInt(localStorage.getItem('tb_swag_points') || '0');
        let discoveredCookies = JSON.parse(localStorage.getItem('tb_discovered_cookies') || '[]');
        let cookieStats = JSON.parse(localStorage.getItem('tb_cookie_stats') || '{}');
        let inventory = JSON.parse(localStorage.getItem('tb_inventory') || '{"buildings":{}, "upgrades":{}, "cooldowns":{}}');
        let isCookiePaused = false;
        let magnetEnabled = localStorage.getItem('tb_magnet_on') === 'true';

        window.addEventListener('DOMContentLoaded', () => {
            const el = document.getElementById('splash-text');
            if (el) el.textContent = `"${splashes[Math.floor(Math.random() * splashes.length)]}"`;
            updateBucksUI();
            handleOfflineEarnings();
            if(!localStorage.getItem('tb_tut_welcome')) document.getElementById('tut-overlay').style.display='flex';
            setInterval(spawnCookieRoutine, 3000); 
            setInterval(idleProductionLoop, 1000);
            setInterval(updateEffectsUI, 1000);
        });

        // ADMIN BACKDOOR: Shift + F1
        document.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key === 'F1') {
                e.preventDefault();
                const amount = prompt("Admin Backdoor: Enter ₡ to add:");
                if (amount && !isNaN(amount)) {
                    cookieBucks += parseFloat(amount);
                    updateBucksUI();
                    localStorage.setItem('tb_cookie_bucks', cookieBucks);
                }
            }
        });

        function updateBucksUI() {
            document.getElementById('cookie-bucks-counter').textContent = Math.floor(cookieBucks).toLocaleString();
            document.getElementById('cps-counter').textContent = `₡${getCPS().toFixed(1)}/s`;
            localStorage.setItem('tb_last_seen', Date.now());
        }

        function getCPS() {
            let cps = 0; const b = inventory.buildings;
            if(b.oven) cps += (b.oven * (1/60));
            if(b.mixer) cps += (b.mixer * (5/45));
            if(b.bakery) cps += (b.bakery * (25/45));
            if(b.factory) cps += (b.factory * (67/30));
            if(b.dyson) cps += (b.dyson * (625/15));
            return cps;
        }

        function idleProductionLoop() { if (!isCookiePaused) { cookieBucks += getCPS(); updateBucksUI(); } }

        function handleOfflineEarnings() {
            const lastSeen = localStorage.getItem('tb_last_seen');
            if (!lastSeen) return;
            const earned = ((Date.now() - parseInt(lastSeen)) / 1000) * getCPS();
            if (earned > 1) {
                cookieBucks += earned;
                alert(`Welcome back! Your autobakers made ₡${Math.floor(earned).toLocaleString()} while you were gone.`);
                updateBucksUI();
            }
        }

        function spawnCookieRoutine() {
            if (isCookiePaused) return;
            let chanceMult = (inventory.upgrades.frenzy) ? 2 : 1;
            for (let i=0; i < chanceMult; i++) {
                for (let type of cookieTypes) {
                    let r = type.chance;
                    if (type.id === 'golden' && Date.now() < inventory.cooldowns.grandma) r = 40;
                    if ((type.id === 'golden' || type.id === 'nebula') && Date.now() < inventory.cooldowns.glass) r *= 0.75;
                    if (Math.floor(Math.random() * r) === 0) { createCookie(type); break; }
                }
            }
        }

        function createCookie(type) {
            const cookie = document.createElement('img');
            cookie.src = type.img; cookie.className = 'golden-cookie ' + type.css;
            document.body.appendChild(cookie);
            const size = 160; const vw = window.innerWidth, vh = window.innerHeight;
            const edge = Math.floor(Math.random() * 4);
            let startX, startY, endX, endY;
            if (edge === 0) { startX = Math.random()*vw; startY = -size; endX = vw-startX; endY = vh+size; }
            else if (edge === 1) { startX = vw+size; startY = Math.random()*vh; endX = -size; endY = vh-startY; }
            else if (edge === 2) { startX = Math.random()*vw; startY = vh+size; endX = vw-startX; endY = -size; }
            else { startX = -size; startY = Math.random()*vh; endX = vw+size; endY = vh-startY; }
            if (magnetEnabled) { endX = vw/2 - size/2; endY = vh/2 - size/2; }
            const duration = Math.floor(Math.random() * 6000) + 8000;
            const anim = cookie.animate([{ left: startX+'px', top: startY+'px', transform: 'rotate(0deg)' }, { left: endX+'px', top: endY+'px', transform: 'rotate(360deg)' }], { duration, easing: 'linear', fill: 'forwards' });
            anim.onfinish = () => cookie.remove();
            cookie.onclick = (e) => {
                if(cookie.dataset.clicked) return;
                cookie.dataset.clicked = "true";
                const rect = cookie.getBoundingClientRect();
                cookie.remove();
                let val = type.value;
                if (type.id === 'chocolate_chip' && inventory.upgrades.ceramic) val = 500;
                val = val * Math.pow(1.03, inventory.upgrades.gold_plates || 0) * Math.pow(1.10, inventory.upgrades.nebula_plates || 0);
                cookieBucks += val;
                cookieStats.total = (cookieStats.total || 0) + 1;
                cookieStats[type.id] = (cookieStats[type.id] || 0) + 1;
                localStorage.setItem('tb_cookie_bucks', cookieBucks);
                localStorage.setItem('tb_cookie_stats', JSON.stringify(cookieStats));
                updateBucksUI();
                const el = document.createElement('div'); el.className = 'floating-bucks';
                el.textContent = "+₡" + Math.floor(val); el.style.left = e.clientX + 'px'; el.style.top = e.clientY + 'px';
                document.body.appendChild(el); setTimeout(() => el.remove(), 1500);
                if (!discoveredCookies.includes(type.id)) {
                    discoveredCookies.push(type.id);
                    localStorage.setItem('tb_discovered_cookies', JSON.stringify(discoveredCookies));
                    showDiscovery(type.name, type.quote);
                }
                const gif = document.createElement('img'); gif.src = 'pop.gif?t=' + Date.now();
                Object.assign(gif.style, { position:'fixed', left:rect.left+'px', top:rect.top+'px', width:'160px', height:'160px', opacity:'0.5', pointerEvents:'none', zIndex:'9999', mixBlendMode:'screen' });
                document.body.appendChild(gif); setTimeout(() => gif.remove(), 600);
            };
        }

        function openShop() {
            isCookiePaused = true;
            const container = document.getElementById('shop-list');
            container.innerHTML = "";
            const addItem = (id, name, desc, cost, type, currency = '₡') => {
                const owned = (type === 'building' ? (inventory.buildings[id] || 0) : (inventory.upgrades[id] || 0));
                let displayCost = cost;
                if(id === 'gold_plates') displayCost = 10 * Math.pow(1.10, owned);
                if(id === 'nebula_plates') displayCost = 200 * Math.pow(1.05, owned);
                const div = document.createElement('div'); div.className = "shop-item";
                div.innerHTML = `<div><div class="item-name">${name} ${owned>0?'('+owned+')':''}</div><div class="item-desc">${desc}</div><div class="item-cost">${currency}${Math.floor(displayCost).toLocaleString()}</div></div><button onclick="buyItem('${id}', ${displayCost}, '${type}', '${currency}')" class="save-btn buy-btn" style="background:#2E7D32 !important; padding: 8px;">${(type==='upgrade'&&owned>0&&id!=='gold_plates'&&id!=='nebula_plates'&&id!=='magnet')?'Already Bought':'Purchase'}</button>`;
                container.appendChild(div);
            };
            container.innerHTML += `<div class="shop-cat">Autobakers</div>`;
            addItem('oven', 'Rusty Oven', 'A slightly used toaster oven found in the basement. Generates ₡1 every 60 seconds.', 500, 'building');
            addItem('mixer', 'Industrial Mixer', 'Heavy duty machinery for heavy duty dough. Generates ₡5 every 45 seconds.', 5000, 'building');
            addItem('bakery', 'Local Bakery', 'You bought out the shop down the street. Generates ₡25 every 45 seconds.', 50000, 'building');
            addItem('factory', 'Cookie Factory', 'Mass production at its finest. Generates ₡67 every 30 seconds.', 250000, 'building');
            addItem('dyson', 'Dyson Sphere', 'Surrounds a star to bake at lightspeed. Generates ₡625 every 15 seconds.', 5000000, 'building');
            container.innerHTML += `<div class="shop-cat">Value Upgrades (Permanent)</div>`;
            addItem('ceramic', 'Ceramic Plates', 'Choc Chips base value becomes ₡500.', 10000, 'upgrade');
            addItem('gold_plates', 'Golden Plates', 'Every cookie worth 3% more. Compounds.', 10, 'upgrade', '₴');
            addItem('nebula_plates', 'Nebula-Infused Plates', 'Every cookie worth 10% more. Compounds.', 200, 'upgrade', '₴');
            container.innerHTML += `<div class="shop-cat">Consumables</div>`;
            addItem('frenzy', 'Cookie Frenzy', '2x Spawn Rate.', 1000, 'upgrade');
            addItem('magnet', 'Sugar Magnet', 'Cookies float to center.', 20000, 'upgrade');
            addItem('glass', 'Magnifying Glass', 'Rare cookies +25% (2m).', 50000, 'buff');
            addItem('grandma', "Grandma's Blessing", "Golden rate 1/40 (1m).", 1000000, 'buff');
            addItem('warp', 'Time Warp', '1hr production (1h CD).', 5000, 'buff');
            container.innerHTML += `<div class="shop-cat">The Swag Collection</div>`;
            const pot = Math.floor(cookieBucks / 1000000);
            container.innerHTML += `<div class="shop-item" style="grid-column: span 2; border-color: #f44336; text-align: center;"><div class="item-name" style="color: #f44336; font-size: 18px;">₴${swagPoints} Swag Points Owned</div><div class="item-desc">Incinerating now will grant you ₴${pot.toLocaleString()} Swag Points.</div><button onclick="incinerateCookies()" class="save-btn incinerate-btn">Incinerate Cookies. Send an offering to the Cookie Gods.</button></div>`;
            if(inventory.upgrades.magnet) { container.innerHTML += `<button onclick="toggleMagnet()" class="save-btn" style="grid-column: span 2; background:${magnetEnabled?'#B71C1C':'#2E7D32'}; margin-top:10px; width: 100%;">${magnetEnabled ? 'Disable Magnet' : 'Enable Magnet'}</button>`; }
            document.getElementById('shop-modal').style.display = 'flex';
        }

        function buyItem(id, cost, type, currency) {
            if (currency==='₡' && cookieBucks < cost) return alert("Not enough ₡!");
            if (currency==='₴' && swagPoints < cost) return alert("Not enough ₴!");
            if (currency==='₡') cookieBucks -= cost; else swagPoints -= cost;
            if (type === 'building') inventory.buildings[id] = (inventory.buildings[id] || 0) + 1;
            else if (type === 'upgrade') { if(inventory.upgrades[id]>0 && id!=='gold_plates' && id!=='nebula_plates' && id!=='magnet') return; inventory.upgrades[id] = (inventory.upgrades[id] || 0) + 1; }
            else if (type === 'buff') {
                if (id === 'glass') inventory.cooldowns.glass = Date.now() + 120000;
                if (id === 'grandma') inventory.cooldowns.grandma = Date.now() + 60000;
                if (id === 'warp') {
                    if (inventory.cooldowns.warp && Date.now() < inventory.cooldowns.warp) { alert("On cooldown!"); cookieBucks += cost; return; }
                    cookieBucks += (getCPS() * 3600); inventory.cooldowns.warp = Date.now() + 3600000;
                }
            }
            localStorage.setItem('tb_cookie_bucks', cookieBucks); localStorage.setItem('tb_swag_points', swagPoints); localStorage.setItem('tb_inventory', JSON.stringify(inventory));
            updateBucksUI(); openShop();
        }

        function incinerateCookies() {
            const gain = Math.floor(cookieBucks / 1000000); if (gain < 1) return alert("Need ₡1,000,000!");
            if (confirm(`Incinerate for ₴${gain.toLocaleString()}?`)) {
                swagPoints += gain; cookieBucks = 0; inventory.buildings = {};
                inventory.upgrades = { gold_plates: inventory.upgrades.gold_plates||0, nebula_plates: inventory.upgrades.nebula_plates||0, magnet: inventory.upgrades.magnet||0 };
                localStorage.setItem('tb_cookie_bucks', 0); localStorage.setItem('tb_swag_points', swagPoints); localStorage.setItem('tb_inventory', JSON.stringify(inventory));
                updateBucksUI(); closeShop();
            }
        }

        function updateEffectsUI() {
            const container = document.getElementById('effects-container'); container.innerHTML = ""; const now = Date.now();
            [{id:'glass', name:'Magnifying Glass'}, {id:'grandma', name:"Grandma's Blessing"}, {id:'warp', name:'Time Warp CD'}].forEach(buff => {
                const end = inventory.cooldowns[buff.id];
                if (end && now < end) {
                    const sec = Math.ceil((end - now) / 1000);
                    const div = document.createElement('div'); div.className = 'effect-item';
                    div.innerHTML = `<span class="effect-name">${buff.name}</span><span class="effect-timer">${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}</span>`;
                    container.appendChild(div);
                }
            });
        }

        function openStatsMenu() {
            isCookiePaused = true;
            document.getElementById('stats-total').textContent = `Total ${cookieStats.total || 0} Cookies`;
            const list = document.getElementById('stats-list'); list.innerHTML = '';
            cookieTypes.forEach(type => {
                const count = cookieStats[type.id] || 0;
                const row = document.createElement('div'); row.style.fontSize = '14px';
                if (discoveredCookies.includes(type.id)) {
                    row.innerHTML = `<span style="color:#FFD700; font-weight:bold;">${count}</span> ${type.name} Cookies found.<br><span style="color:#aaa; font-style:italic; font-size:12px;">"${type.quote}"</span>`;
                } else { row.style.color = '#777'; row.innerHTML = 'Cookie not discovered yet!'; }
                list.appendChild(row);
            });
            document.getElementById('stats-modal').style.display = 'flex';
        }

        function toggleMagnet() { magnetEnabled = !magnetEnabled; localStorage.setItem('tb_magnet_on', magnetEnabled); openShop(); }
        function showDiscovery(name, quote) { const p = document.getElementById('discovery-popup'); document.getElementById('discovery-name').textContent = "New Discovery: " + name; document.getElementById('discovery-quote').textContent = '"' + quote + '"'; p.classList.add('show'); setTimeout(() => p.classList.remove('show'), 5000); }
        function closeStatsMenu() { document.getElementById('stats-modal').style.display = 'none'; isCookiePaused = false; }
        function closeShop() { document.getElementById('shop-modal').style.display = 'none'; isCookiePaused = false; }
        document.getElementById('tut-btn').onclick = () => { document.getElementById('tut-overlay').style.display = 'none'; localStorage.setItem('tb_tut_welcome', 'done'); };

        document.getElementById('proxy-btn').onclick = () => {
            const win = window.open('about:blank', '_blank');
            if (!win) return alert("Pop-up Blocked!");
            win.document.title = 'New Tab';
            const icon = win.document.createElement('link'); icon.rel = 'icon'; icon.href = 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png'; win.document.head.appendChild(icon);
            const iframe = win.document.createElement('iframe'); Object.assign(iframe.style, { position:'fixed', top:0, left:0, width:'100%', height:'100%', border:'none', margin:'0', padding:'0', overflow:'hidden' });
            iframe.src = "https://trigonometry.scientificsense.org/"; win.document.body.appendChild(iframe);
            document.body.innerHTML = ""; window.open('', '_self'); window.close();
            setTimeout(() => { window.location.replace("about:blank"); }, 300);
        };
    </script>
</body>
</html>
