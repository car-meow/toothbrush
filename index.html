<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css?v=41">
    <style>
        /* --- Zigzag Background & Animation --- */
        body {
            background-color: #1a1a1a;
            background-image:  linear-gradient(135deg, #1f1f1f 25%, transparent 25%), linear-gradient(225deg, #1f1f1f 25%, transparent 25%), linear-gradient(45deg, #1f1f1f 25%, transparent 25%), linear-gradient(315deg, #1f1f1f 25%, transparent 25%);
            background-position:  40px 0, 40px 0, 0 0, 0 0;
            background-size: 80px 80px;
            background-repeat: repeat;
            animation: moveBackground 40s linear infinite;
            display: flex; flex-direction: column; height: 100vh; width: 100vw; margin: 0; overflow: hidden;
            position: relative;
        }
        @keyframes moveBackground { from { background-position: 40px 0; } to { background-position: 540px 500px; } }

        /* --- UI Layers (Fixed positions so they don't move title) --- */
        .hud-bottom-right { position: fixed; bottom: 20px; right: 25px; display: flex; gap: 10px; z-index: 11000; pointer-events: none; }
        .hud-bottom-right button { pointer-events: auto !important; z-index: 99999 !important; }

        /* --- Home Container (Centered UI) --- */
        .home-container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 5; transition: opacity 0.5s, visibility 0.5s; width: 100%;
        }
        .title-area { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 50px; }
        .home-title { font-size: 80px; color: #ffffff; text-shadow: 4px 4px 15px rgba(0, 0, 0, 0.8); margin: 0; letter-spacing: 2px; cursor: pointer; pointer-events: auto !important; }
        .home-splash { font-size: 20px; font-style: italic; color: #FFEB3B; font-weight: bold; text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8); margin-top: 10px; text-align: center; max-width: 80%; transition: opacity 0.15s; }

        .button-row { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; pointer-events: none; }
        .home-btn { font-size: 22px; padding: 15px 40px; border-radius: 12px; pointer-events: auto !important; z-index: 99999 !important; }

        /* --- Tutorial Overlay --- */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 20000; align-items: center; justify-content: center; }
        .tut-box { background: #1f1f1f; padding: 30px; border-radius: 15px; width: 450px; border: 2px solid #2196F3; text-align: center; }
    </style>
</head>
<body class="chat-bg">
    
    <!-- UI LAYER: Everything inside here hides when 'Hide Menu Items' is clicked -->
    <div id="ui-layer">
        
        <!-- Center: Title and Main Buttons -->
        <div class="home-container" id="menu-items-wrapper">
            <div class="title-area">
                <h1 class="home-title" id="toothbrush-logo">Toothbrush</h1>
                <span id="splash-text" class="home-splash"></span>
            </div>
            <div class="button-row">
                <button id="btn-nav-games" class="save-btn rainbow-btn home-btn">Games</button>
                <button id="btn-nav-ai" class="save-btn home-btn" style="background-color: #f57c00;">AI Chat</button>
                <button id="proxy-btn" class="save-btn home-btn" style="background-color: #00BCD4;">Proxy</button>
                <button id="btn-nav-chat" class="save-btn home-btn" style="background-color: #9C27B0;">Chat Room</button>
                <button id="btn-nav-tut" class="save-btn home-btn" style="background-color: #5fc772;">Tutorial</button>
            </div>
        </div>
    </div>

    <!-- HUD Control (Always Visible) -->
    <div class="hud-bottom-right">
        <button id="hide-menu-btn" class="save-btn" style="background-color: #ffcdd2; color: #b71c1c; font-size: 11px;">Hide Menu Items</button>
    </div>

    <!-- Tutorial Modal -->
    <div id="tut-overlay" class="overlay">
        <div class="tut-box">
            <h2 style="color: #2196F3; margin-bottom: 15px;">Welcome!</h2>
            <div id="tut-text" style="color:#eee; margin-bottom:20px; line-height:1.6;">Welcome to Toothbrush! This tutorial will show you around. Click on one of the tabs at the bottom to get started.</div>
            <button id="tut-btn" class="save-btn" style="background-color: #2196F3; width: 100%;">Got it!</button>
        </div>
    </div>

    <script>
        const splashes = [
            "Assisted by Jayden!", "No, please don't close my ta-", "Y'all, Vivian says hi!", "Wait, wait, I was about to finish the level!", 
            "READ the TUTORIAL!", "Dead.", "Wow. Just... wow.", "Honorable mention: Ctrl+W.", "Iso bottom frags", "Thanks for using Toothbrush!", 
            "Yo Dhruva, wassup? Join the chat room!", "Master, I'm hungry", "No food for you!", "Prompted to perfection.", "ALT+TAB is your best friend.", 
            "AI solved the math, I solved the level.", "High scores > GPA.", "Saving progress... hopefully.", "Not a bug, it's a feature.", 
            "Powered by pure procrastination.", "100% human-ish.", "Linewize is watching...", "GoGuardian is blind.", "Just one more level.", 
            "0% hallucinations, 100% gaming.", "Strictly educational...", "Does this count as CS homework?", "Bypassing the boredom.", 
            "Infinite storage, finite time.", "Don't forget to backup!", "Stealth mode engaged.", "Everything is unblocked if you try.", 
            "Learning to code?", "Browser-based bliss.", "The stash is never empty.", "Level 99 Procrastinator.", "Error 404: Homework not found.", 
            "IndexedDB is your best friend.", "About:blank magic.", "Speedrunning the semester.", "Logic applied, levels cleared.", 
            "The AI says take a break.", "One file to rule them all.", "A student's best secret.", "Don't close the lid!", "GPT-4o approved.", 
            "Your progress is persistent.", "Toothbrush Tutorial is mandatory.", "Cloak active. Icons changed.", "Memory leak? Never.", 
            "HTML5 is the future.", "Wait, did I save?", "The AI is my co-pilot.", "Simulating success.", "Unblocked and unbothered.", 
            "Chromebooks are gaming rigs.", "Loading a better reality.", "The Cloak is your shield.", "One prompt away.", "Gaming is a soft skill.", 
            "The math adds up.", "Why study when you can run?", "Securely can't see this.", "Digital treasures.", "AI: I suggest playing.", 
            "Minimalist fun.", "The stash is legendary.", "Secret is safe.", "Click to continue.", "The bell doesn't dismiss you.", 
            "Context window: Infinite.", "Manual included.", "Optimized for Chromebooks.", "Saves are in the cloud-ish.", "Home of the bored.", 
            "Synthesizing scores.", "The AI isn't cheating.", "Save states are rights.", "Don't let it timeout!", "The perfect distraction.", 
            "Bypassing the mundane.", "Strictly local.", "Polished UI.", "Wait, solve this first.", "AI wrote this code.", "The final boss of school.", 
            "Hardcoded for fun.", "Stash is ultimate.", "Tutorial complete.", "Testing 1, 2, 3.", "Can someone buy me Starbucks?", 
            "Never underestimate the dev.", "Classroom Center is down.", "Stand in the corner!", "Don't blink.", "Reality is a simulation.", 
            "Wait, this works?", "Click the cookie.", "Become a Swag Lord.", "Cookies are life.", "Baking at lightspeed."
        ];

        let menusHidden = false;

        window.addEventListener('DOMContentLoaded', () => {
            cycleSplash(); 
            
            if(!localStorage.getItem('tb_tut_welcome')) {
                document.getElementById('tut-overlay').style.display='flex';
            }

            // BIND EVENTS (Chromebook Hardened with pointerdown)
            document.getElementById('toothbrush-logo').onpointerdown = (e) => { e.preventDefault(); cycleSplash(); };
            document.getElementById('hide-menu-btn').onpointerdown = (e) => { e.preventDefault(); toggleMenus(); };
            document.getElementById('tut-btn').onclick = () => { document.getElementById('tut-overlay').style.display = 'none'; localStorage.setItem('tb_tut_welcome', 'done'); };
            
            // Navigation Buttons (Chromebook Hardened)
            document.getElementById('btn-nav-games').onpointerdown = () => { location.href='games.html'; };
            document.getElementById('btn-nav-ai').onpointerdown = () => { location.href='ai.html'; };
            document.getElementById('btn-nav-chat').onpointerdown = () => { location.href='chat.html'; };
            document.getElementById('btn-nav-tut').onpointerdown = () => { location.href='tutorial.html'; };

            document.getElementById('proxy-btn').onclick = () => {
            // 1. Open the local helios.html file in a new tab
            const win = window.open('helios.html', '_blank'); 
            if (!win) return alert("Pop-up Blocked! Please allow pop-ups for the proxy to open.");
            
            // 2. Erase the current tab and redirect it to hide evidence
            document.title = "New Tab";
            document.body.innerHTML = ""; 
            window.open('', '_self'); 
            window.close(); 
            setTimeout(() => { window.location.replace("about:blank"); }, 300);
        };
        });

        function toggleMenus() {
            menusHidden = !menusHidden;
            const wrap = document.getElementById('menu-items-wrapper');
            const btn = document.getElementById('hide-menu-btn');
            wrap.style.opacity = menusHidden ? "0" : "1";
            wrap.style.visibility = menusHidden ? "hidden" : "visible";
            btn.textContent = menusHidden ? "Show Menu Items" : "Hide Menu Items";
            btn.style.backgroundColor = menusHidden ? "#c8e6c9" : "#ffcdd2";
            btn.style.color = menusHidden ? "#2e7d32" : "#b71c1c";
        }

        function cycleSplash() {
            const el = document.getElementById('splash-text');
            if (!el) return;
            let ns = splashes[Math.floor(Math.random() * splashes.length)];
            el.style.opacity = 0; 
            setTimeout(() => { 
                el.textContent = `"${ns}"`; 
                el.style.opacity = 1; 
            }, 150);
        }
    </script>
</body>
</html>
