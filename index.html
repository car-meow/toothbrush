<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- Zigzag Background for Home Screen --- */
        body {
            background-color: #1a1a1a;
            background-image:  linear-gradient(135deg, #1f1f1f 25%, transparent 25%), linear-gradient(225deg, #1f1f1f 25%, transparent 25%), linear-gradient(45deg, #1f1f1f 25%, transparent 25%), linear-gradient(315deg, #1f1f1f 25%, transparent 25%);
            background-position:  40px 0, 40px 0, 0 0, 0 0;
            background-size: 80px 80px;
            background-repeat: repeat;
            animation: moveBackground 40s linear infinite;
        }

        @keyframes moveBackground {
            from { background-position: 40px 0, 40px 0, 0 0, 0 0; }
            to { background-position: 540px 500px, 540px 500px, 500px 500px, 500px 500px; }
        }

        .home-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding-bottom: 8vh;
        }

        .title-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .home-title {
            font-size: 80px;
            color: #ffffff;
            text-shadow: 4px 4px 15px rgba(0, 0, 0, 0.8);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .home-splash {
            font-size: 20px;
            font-style: italic;
            color: #FFEB3B;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
            animation: splash-pulse 2s infinite ease-in-out;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .home-btn {
            font-size: 22px;
            padding: 15px 40px;
            border-radius: 12px;
        }

        /* --- Golden Cookie CSS --- */
        .golden-cookie {
            position: fixed;
            width: 110px; 
            height: 110px;
            z-index: 9999;
            cursor: pointer;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8)) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
            animation: cookie-spin 8s linear infinite;
        }

        @keyframes cookie-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Essential overlay class so it hides the modal by default */
        .overlay {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 10000; 
            align-items: center; justify-content: center;
        }

        .cookie-modal-box {
            background: #1f1f1f;
            padding: 35px;
            border-radius: 20px;
            width: 350px;
            border: 2px solid #FFD700;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }
    </style>
</head>
<body>
    
    <div class="home-container">
        <!-- Cookie Bucks Counter (Top Left) -->
    <div style="position: fixed; top: 20px; left: 25px; font-size: 32px; font-weight: bold; color: #FFEB3B; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); z-index: 10000; display: flex; align-items: center; gap: 8px;">
        <span style="font-size: 42px;">₡</span> <span id="cookie-bucks-counter">0</span>
    </div>

    <!-- Discovery Popup Notification -->
    <div id="discovery-popup" class="discovery-popup">
        <h3 id="discovery-name" style="color: #FFD700; margin-bottom: 5px; font-size: 22px; text-shadow: 1px 1px 2px black;"></h3>
        <p id="discovery-quote" style="color: #ddd; font-style: italic; font-size: 16px;"></p>
    </div>

        <!-- Title and Splash -->
        <div class="title-area">
            <h1 class="home-title">Toothbrush</h1>
            <span id="splash-text" class="home-splash"></span>
        </div>

        <!-- Bottom Button Row -->
        <div class="button-row">
            <button onclick="location.href='games.html'" class="save-btn rainbow-btn home-btn">Games</button>
            <button onclick="location.href='ai.html'" class="save-btn home-btn" style="background-color: #f57c00;">AI Chat</button>
            <button id="proxy-btn" class="save-btn home-btn" style="background-color: #00BCD4;">Proxy</button>
            <button onclick="location.href='chat.html'" class="save-btn home-btn" style="background-color: #9C27B0;">Chat Room</button>
            <button onclick="location.href='tutorial.html'" class="save-btn home-btn" style="background-color: #5fc772;">Tutorial</button>
        </div>
    </div>

    <script>
        // Splash Text Logic
        const splashes =[
            "\"Assisted by Jayden!\"", "\"No, please don't close my ta-\"", "\"Wait, wait, I was about to finish the level!\"",
            "\"Prompted to perfection.\"", "\"ALT+F4: The ultimate speedrun tactic.\"", "\"My AI solved the math, I solved the level.\"",
            "\"High scores > GPA.\"", "\"Is it lag, or just the school WiFi?\"", "\"The teacher is coming, hit the Pink button!\"",
            "\"Database authorized.\"", "\"Saving your progress... hopefully.\"", "\"Not a bug, it's a feature.\"",
            "\"Llama-3 made me do it.\"", "\"Powered by pure procrastination.\"", "\"100% human-ish.\"",
            "\"Linewize can't see this.\"", "\"The ultimate study break.\"", "\"Just one more level before the bell.\"",
            "\"0% AI hallucinations, 100% gaming.\"", "\"Your high score is in the database.\"", "\"Strictly for educational purposes...\"",
            "\"Does this count as computer science?\"", "\"Bypassing the boredom.\"", "\"Infinite storage, finite time.\"",
            "\"Don't forget to backup!\"", "\"Restoring sanity, one game at a time.\"", "\"Calculated risks and heavy prompts.\"",
            "\"The AI knows the way.\"", "\"More tabs, more problems.\"", "\"Stealth mode engaged.\"",
            "\"Drive Mad? More like Drive Focused.\"", "\"Everything is unblocked if you try hard enough.\"", "\"Learning to code by playing games.\"",
            "\"Browser-based bliss.\"", "\"The stash is never empty.\"", "\"Level 99 Procrastinator.\"",
            "\"Prompt: 'Make me better at this game'.\"", "\"Error 404: Homework not found.\"", "\"Check your permissions.\"",
            "\"IndexedDB is my best friend.\"", "\"About:blank? Nothing to see here.\"", "\"The code is clean, the high score is not.\"",
            "\"Speedrunning through the semester.\"", "\"Logic applied, levels cleared.\"", "\"The AI said I should take a break.\"",
            "\"One file to rule them all.\"", "\"It's basically a digital library.\"", "\"A student's best kept secret.\"",
            "\"Don't close the lid yet!\"", "\"Frames per second > words per minute.\"", "\"GPT-4o approved.\"",
            "\"Your progress is persistent.\"", "\"Toothbrush Tutorial is mandatory reading.\"", "\"The sidebar of secrets.\"",
            "\"Cloak active. Icons changed.\"", "\"Memory leak? Never heard of her.\"", "\"HTML5: The future of study hall.\"",
            "\"Wait, did I save?\"", "\"The AI is my co-pilot.\"", "\"Simulating success.\"",
            "\"Pixel-perfect procrastination.\"", "\"Unblocked and unbothered.\"", "\"School computers are just gaming rigs in disguise.\"",
            "\"Loading a better reality.\"", "\"The Cloak button is your shield.\"", "\"Database synced.\"",
            "\"One prompt away from victory.\"", "\"Gaming is a soft skill.\"", "\"The math adds up.\"",
            "\"Why study when you can speedrun?\"", "\"Securely can't see about:blank.\"", "\"A collection of digital treasures.\"",
            "\"AI: 'I suggest playing 2048'.\"", "\"Minimalist interface, maximalist fun.\"", "\"The stash is legendary.\"",
            "\"Your secret is safe with the browser.\"", "\"Click to continue.\"", "\"The bell doesn't dismiss you, I do.\"",
            "\"Context window: Infinite.\"", "\"The PDF is the manual.\"", "\"Optimized for low-end Chromebooks.\"",
            "\"Your saves are in the cloud-ish.\"", "\"Toothbrush: The home of the bored.\"", "\"Synthesizing high scores.\"",
            "\"The AI isn't cheating, it's 'assisting'.\"", "\"Save states are a human right.\"", "\"Don't let the tab timeout!\"",
            "\"The perfect distraction.\"", "\"Bypassing the mundane.\"", "\"Strictly local storage.\"",
            "\"The UI is polished, the games are not.\"", "\"A masterclass in distraction.\"", "\"Wait, I actually need to solve this.\"",
            "\"The AI wrote the code, you play the game.\"", "\"Everything is fine.\"", "\"The final boss of the school year.\"",
            "\"Your progress is our priority.\"", "\"Hardcoded for fun.\"", "\"The stash is ultimate for a reason.\"",
            "\"READ the TUTORIAL!\"", "\"Dead.\"", "\"Wow. Just... wow.\"", "\"Honorable mention: Ctrl+W.\"", "\"Wait, this actually works?.\"", "\"Testing, testing, 123\"", "\"Can someone buy me Starbucks? Please?\"",
            "\"Never underestimate the guy who writes the splash text! Who is also the dev!\"", "\"Thanks for using Toothbrush!\"", "\"Also try 55gms.app!\"", "\"Why is Classroom Center down..?\"",
            "\"Master, I'm hungry\"", "\"No food for you! Now be a good boy and stand in the corner.\"", "\"Iso bottom frags\""
        ]; 

        window.addEventListener('DOMContentLoaded', () => {
            // Splash Text Logic
            const el = document.getElementById('splash-text');
            if (el) el.textContent = splashes[Math.floor(Math.random() * splashes.length)];

            // Initialize the Cookie Game
            updateBucksUI();
            setInterval(spawnCookieRoutine, 3000); // Tries to spawn a cookie every 3 seconds
        });

        // --- COOKIE CLICKER MINI-GAME ---
        
        let cookieBucks = parseInt(localStorage.getItem('tb_cookie_bucks') || '0');
        let discoveredCookies = JSON.parse(localStorage.getItem('tb_discovered_cookies') || '[]');

        // The Cookie Dictionary (Add new cookies here easily!)
        const cookieTypes =[
            { id: 'nebula', name: 'Nebula', value: 10000, chance: 1000, quote: "Woah, is that a portal to space?", img: 'Cookies/nebula.png', css: 'aura-nebula' },
            { id: 'golden', name: 'Golden Cookie', value: 1000, chance: 300, quote: "Thanks, Grandma!", img: 'Cookies/golden.png', css: 'aura-golden' },
            { id: 'sugar', name: 'Sugar (with sprinkle)', value: 100, chance: 50, quote: "So sweet, my teeth burn!", img: 'Cookies/sugar.png', css: 'aura-sugar' },
            { id: 'smore', name: "S'more", value: 75, chance: 35, quote: "Fresh from the campfire!", img: 'Cookies/smore.png', css: 'aura-smore' },
            { id: 'chocolate', name: 'Chocolate', value: 20, chance: 25, quote: "Are you sure you didn't put a brownie in the cookie cutter?", img: 'Cookies/chocolate.png', css: 'aura-chocolate' },
            { id: 'snickerdoodle', name: 'Snickerdoodle', value: 10, chance: 20, quote: "Soft AND cinnamony- what's not to like?", img: 'Cookies/snickerdoodle.png', css: 'aura-snickerdoodle' },
            { id: 'peanut_butter', name: 'Peanut Butter', value: 5, chance: 15, quote: "Ooooh, my favorite!", img: 'Cookies/peanut_butter.png', css: 'aura-peanut' },
            { id: 'cashew', name: 'Cashew', value: 4, chance: 10, quote: "Hope you're having a good day!", img: 'Cookies/cashew.png', css: 'aura-cashew' },
            { id: 'oatmeal_raisin', name: 'Oatmeal Raisin', value: 3, chance: 5, quote: "An under-appreciated classic.", img: 'Cookies/oatmeal_raisin.png', css: 'aura-oatmeal' },
            { id: 'chocolate_chip', name: 'Chocolate Chip', value: 1, chance: 3, quote: "You can't go wrong with the basics.", img: 'Cookies/chocolate_chip.png', css: 'aura-basic' }
        ];

        function updateBucksUI() {
            document.getElementById('cookie-bucks-counter').textContent = cookieBucks.toLocaleString();
        }

        function spawnCookieRoutine() {
            // Evaluates from rarest to most common to prevent common ones overriding rare spawns
            let spawnedType = null;
            for (let type of cookieTypes) {
                if (Math.floor(Math.random() * type.chance) === 0) {
                    spawnedType = type;
                    break; 
                }
            }

            if (!spawnedType) return; // Nothing spawned this tick

            // Create Cookie HTML Element
            const cookie = document.createElement('img');
            cookie.src = spawnedType.img;
            cookie.className = 'cookie-entity ' + spawnedType.css;
            document.body.appendChild(cookie);

            // Calculate Random Edge-to-Edge Trajectory
            const size = 110;
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const edge = Math.floor(Math.random() * 4);
            let startX, startY, endX, endY;

            if (edge === 0) { startX = Math.random() * vw; startY = -size; endX = vw - startX; endY = vh + size; }
            else if (edge === 1) { startX = vw + size; startY = Math.random() * vh; endX = -size; endY = vh - startY; }
            else if (edge === 2) { startX = Math.random() * vw; startY = vh + size; endX = vw - startX; endY = -size; }
            else { startX = -size; startY = Math.random() * vh; endX = vw + size; endY = vh - startY; }

            // Float across screen
            const animation = cookie.animate([
                { left: startX + 'px', top: startY + 'px' },
                { left: endX + 'px', top: endY + 'px' }
            ], { duration: 10000, easing: 'linear', fill: 'forwards' });

            // Remove if it floats off-screen
            animation.onfinish = () => cookie.remove();

            // When user clicks the cookie!
            cookie.onclick = (e) => {
                cookie.remove();
                
                // Add money and save
                cookieBucks += spawnedType.value;
                localStorage.setItem('tb_cookie_bucks', cookieBucks);
                updateBucksUI();

                // Show floating text (+₡5)
                showFloatingText(e.clientX, e.clientY, "+₡" + spawnedType.value);

                // Handle First Discovery
                if (!discoveredCookies.includes(spawnedType.id)) {
                    discoveredCookies.push(spawnedType.id);
                    localStorage.setItem('tb_discovered_cookies', JSON.stringify(discoveredCookies));
                    showDiscovery(spawnedType.name, spawnedType.quote);
                }
            };
        }

        // Creates the floating green text where the mouse clicked
        function showFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-bucks';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500); // Cleans up after animation
        }

        // Drops the non-intrusive alert from the top of the screen
        let discoveryTimeout;
        function showDiscovery(name, quote) {
            const popup = document.getElementById('discovery-popup');
            document.getElementById('discovery-name').textContent = "New Cookie Discovered: " + name;
            document.getElementById('discovery-quote').textContent = '"' + quote + '"';
            
            popup.classList.remove('show');
            void popup.offsetWidth; // Force CSS reflow so animation restarts
            popup.classList.add('show');
            
            clearTimeout(discoveryTimeout);
            discoveryTimeout = setTimeout(() => {
                popup.classList.remove('show');
            }, 5000);
        }

        // Proxy Logic (Launches in about:blank and closes home screen)
        document.getElementById('proxy-btn').onclick = () => {
            const win = window.open('about:blank', '_blank');
            if (!win) return alert("Pop-up Blocked! Please allow pop-ups.");
            
            // Set the cloaked tab title and icon
            win.document.title = 'New Tab';
            const icon = win.document.createElement('link');
            icon.rel = 'icon';
            icon.href = 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png';
            win.document.head.appendChild(icon);

            // Inject the proxy iframe
            const iframe = win.document.createElement('iframe');
            Object.assign(iframe.style, {
                position: 'fixed', top: '0', left: '0', width: '100%', height: '100%',
                border: 'none', margin: '0', padding: '0', overflow: 'hidden'
            });
            iframe.src = "https://trigonometry.scientificsense.org/";
            win.document.body.appendChild(iframe);

            // Kill the original tab
            document.title = "New Tab";
            document.body.innerHTML = ""; 
            window.open('', '_self');
            window.close();
            setTimeout(() => { window.location.replace("about:blank"); }, 300);
        };
		
    </script>
	
	<!-- Tutorial Modal -->
    <div id="tut-overlay" class="tut-overlay">
        <div class="tut-box">
            <h2 style="color: #2196F3; margin-bottom: 15px;">Welcome!</h2>
            <div id="tut-text" class="tut-text"></div>
            <button id="tut-btn" class="save-btn" style="background-color: #2196F3; width: 100%; font-size: 16px;">Next</button>
        </div>
    </div>

    <script>
        // EDIT YOUR TEXT HERE:
        const tutorialSteps =[
            "Welcome to Toothbrush! This tutorial will show you around. Click on one of the tabs at the bottom to get started. (If you'd like to replay this tutorial, click on the Tutorial tab in the home screen and click 'Replay In-App Tutorial'.)"
        ];
        
        let currentStep = 0;
        
        // Check if this specific tutorial has been played before
        if (!localStorage.getItem('tb_tut_welcome')) {
            document.getElementById('tut-overlay').style.display = 'flex';
            updateTut();
        }
        
        function updateTut() {
            document.getElementById('tut-text').textContent = tutorialSteps[currentStep];
            document.getElementById('tut-btn').textContent = (currentStep === tutorialSteps.length - 1) ? "Got it!" : "Next";
        }
        
        document.getElementById('tut-btn').onclick = () => {
            currentStep++;
            if (currentStep >= tutorialSteps.length) {
                document.getElementById('tut-overlay').style.display = 'none';
                localStorage.setItem('tb_tut_welcome', 'done'); // Mark as finished
            } else {
                updateTut();
            }
        };
    </script>
	
</body>
</html>
