<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Media - Toothbrush</title>
    <link rel="stylesheet" href="style.css?v=48">
    <style>
        body {
            overflow-y: auto;
            background-color: var(--zigzag-bg);
            background-image: linear-gradient(135deg, var(--zigzag-line) 25%, transparent 25%), linear-gradient(225deg, var(--zigzag-line) 25%, transparent 25%), linear-gradient(45deg, var(--zigzag-line) 25%, transparent 25%), linear-gradient(315deg, var(--zigzag-line) 25%, transparent 25%);
            background-position: 40px 0, 40px 0, 0 0, 0 0;
            background-size: 80px 80px;
            animation: moveBackground 40s linear infinite;
        }

        .media-container {
            padding: 20px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .search-area {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .media-search {
            width: 100%;
            max-width: 600px;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 30px;
            border: 2px solid #9C27B0;
            background: rgba(26, 26, 26, 0.9);
            color: #fff;
            outline: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: border-color 0.3s;
        }

        .media-search:focus {
            border-color: #E91E63;
        }

        .media-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            padding-left: 10px;
            border-left: 4px solid #9C27B0;
        }

        .media-row {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px 10px;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE and Edge */
        }

        .media-row::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        .media-card {
            flex: 0 0 auto;
            width: 180px;
            height: 270px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s;
            background: #1a1a1a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .media-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.4s;
        }

        .media-card:hover {
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .media-card:hover img {
            filter: brightness(0.4) blur(2px);
        }

        .media-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            padding: 15px;
            text-align: center;
            color: #fff;
        }

        .media-card:hover .media-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(156, 39, 176, 0.8));
        }

        .media-title {
            font-weight: bold;
            font-size: 14px;
            margin-top: auto;
            line-height: 1.2;
        }

        .media-date {
            font-size: 11px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .results-container {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 30px;
            padding: 20px 0;
        }

        .loading-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(156, 39, 176, 0.3);
            border-radius: 50%;
            border-top-color: #9C27B0;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 50px 0;
        }

        .back-to-browse {
            display: none;
            margin-bottom: 20px;
            color: #9C27B0;
            cursor: pointer;
            font-weight: bold;
            align-items: center;
            gap: 5px;
        }

        .back-to-browse:hover {
            text-decoration: underline;
        }

        /* Player UI Mockup Colors */
        .player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
        }
    </style>
</head>
<body class="media-bg">
    <header>
        <h1 onclick="location.href='index.html'">Toothbrush Movies & TV</h1>
        <div class="controls">
            <button onclick="location.href='index.html'" class="save-btn" style="background-color: #3d3d3d;">Back</button>
        </div>
    </header>

    <div class="media-container">
        <div class="search-area">
            <input type="text" class="media-search" id="media-search" placeholder="Search for a movie or TV show...">
        </div>

        <div id="browse-sections">
            <div class="media-section">
                <div class="section-title">Trending Now</div>
                <div class="media-row" id="trending-row">
                    <div class="loading-wrap"><div class="loading-spinner"></div></div>
                </div>
            </div>

            <div class="media-section">
                <div class="section-title">Popular Movies</div>
                <div class="media-row" id="popular-movies-row">
                    <div class="loading-wrap"><div class="loading-spinner"></div></div>
                </div>
            </div>

            <div class="media-section">
                <div class="section-title">Top TV Shows</div>
                <div class="media-row" id="popular-tv-row">
                    <div class="loading-wrap"><div class="loading-spinner"></div></div>
                </div>
            </div>
        </div>

        <div id="search-results-section" style="display: none;">
            <div class="back-to-browse" id="back-to-browse">← Back to Browse</div>
            <div class="section-title" id="search-title">Search Results</div>
            <div class="results-container" id="search-results">
                <!-- Search results injected here -->
            </div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = 'c168239e248b94098939c0a64936d80d';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';

        async function fetchMedia(endpoint) {
            const response = await fetch(`https://api.themoviedb.org/3/${endpoint}?api_key=${TMDB_API_KEY}`);
            const data = await response.json();
            return data.results;
        }

        function createMediaCard(item) {
            const card = document.createElement('div');
            card.className = 'media-card';
            
            const title = item.title || item.name;
            const date = item.release_date || item.first_air_date || 'Unknown Date';
            const year = date.split('-')[0];
            const poster = item.poster_path ? IMG_URL + item.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster';
            const type = item.title ? 'movie' : 'tv';

            card.innerHTML = `
                <img src="${poster}" alt="${title}">
                <div class="media-overlay">
                    <img src="Assets/mediaP.png" class="play-icon" alt="Play">
                    <div class="media-date">${year}</div>
                    <div class="media-title">${title}</div>
                </div>
            `;

            card.onclick = () => openPlayer(item.id, type, title);
            return card;
        }

        async function init() {
            const trendingRow = document.getElementById('trending-row');
            const movieRow = document.getElementById('popular-movies-row');
            const tvRow = document.getElementById('popular-tv-row');

            try {
                const trending = await fetchMedia('trending/all/week');
                trendingRow.innerHTML = '';
                trending.forEach(item => trendingRow.appendChild(createMediaCard(item)));

                const movies = await fetchMedia('movie/popular');
                movieRow.innerHTML = '';
                movies.forEach(item => movieRow.appendChild(createMediaCard(item)));

                const tv = await fetchMedia('tv/popular');
                tvRow.innerHTML = '';
                tv.forEach(item => tvRow.appendChild(createMediaCard(item)));
            } catch (err) {
                console.error("Failed to load media:", err);
                [trendingRow, movieRow, tvRow].forEach(row => {
                    row.innerHTML = '<div style="color: #ff5252; padding: 20px;">Failed to load data. Please check your connection.</div>';
                });
            }
        }

        // Search logic
        const searchInput = document.getElementById('media-search');
        const browseSections = document.getElementById('browse-sections');
        const resultsSection = document.getElementById('search-results-section');
        const resultsContainer = document.getElementById('search-results');
        const backToBrowse = document.getElementById('back-to-browse');

        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length < 3) {
                if (query.length === 0) resetSearch();
                return;
            }

            searchTimeout = setTimeout(async () => {
                const results = await fetchMedia(`search/multi?query=${encodeURIComponent(query)}`);
                displayResults(results);
            }, 500);
        });

        function displayResults(results) {
            browseSections.style.display = 'none';
            resultsSection.style.display = 'block';
            backToBrowse.style.display = 'flex';
            resultsContainer.innerHTML = '';
            
            results.filter(i => i.media_type !== 'person').forEach(item => {
                resultsContainer.appendChild(createMediaCard(item));
            });
        }

        function resetSearch() {
            searchInput.value = '';
            browseSections.style.display = 'block';
            resultsSection.style.display = 'none';
        }

        backToBrowse.onclick = resetSearch;

        function openPlayer(id, type, title) {
            // Using about:blank cloaking as requested
            const win = window.open('about:blank', '_blank');
            if (!win) {
                alert('Please allow popups for this site to watch movies!');
                return;
            }

            const embedUrl = type === 'movie' 
                ? `https://vidsrc.to/embed/movie/${id}` 
                : `https://vidsrc.to/embed/tv/${id}/1/1`;

            // HTML content for the about:blank page
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>${title} - Toothbrush Player</title>
                    <style>
                        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
                        iframe { width: 100%; height: 100%; border: none; }
                        .source-selector {
                            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                            display: flex; gap: 10px; background: rgba(20,20,20,0.8);
                            padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(5px);
                            z-index: 1000; opacity: 0.3; transition: opacity 0.3s;
                        }
                        .source-selector:hover { opacity: 1; }
                        .source-btn {
                            background: #333; color: #fff; border: none; padding: 8px 15px;
                            border-radius: 15px; cursor: pointer; font-size: 12px; transition: background 0.2s;
                        }
                        .source-btn:hover { background: #9C27B0; }
                        .source-btn.active { background: #9C27B0; font-weight: bold; }
                    </style>
                </head>
                <body>
                    <iframe id="player-frame" src="${embedUrl}" allowfullscreen></iframe>
                    
                    <div class="source-selector">
                        <button class="source-btn active" onclick="changeSource('vidsrc')">VidSrc</button>
                        <button class="source-btn" onclick="changeSource('2embed')">2Embed</button>
                        <button class="source-btn" onclick="changeSource('superembed')">SuperEmbed</button>
                    </div>

                    <script>
                        const id = '${id}';
                        const type = '${type}';
                        const frame = document.getElementById('player-frame');
                        const btns = document.querySelectorAll('.source-btn');

                        function changeSource(src) {
                            btns.forEach(b => b.classList.remove('active'));
                            event.target.classList.add('active');

                            if (src === 'vidsrc') {
                                frame.src = type === 'movie' ? 'https://vidsrc.to/embed/movie/' + id : 'https://vidsrc.to/embed/tv/' + id + '/1/1';
                            } else if (src === '2embed') {
                                frame.src = 'https://www.2embed.cc/embed' + (type === 'movie' ? 'movie' : 'tv') + '?tmdb=' + id + (type === 'tv' ? '&s=1&e=1' : '');
                            } else if (src === 'superembed') {
                                frame.src = 'https://multiembed.mov/?video_id=' + id + '&tmdb=1' + (type === 'tv' ? '&s=1&e=1' : '');
                            }
                        }
                    <\/script>
                </body>
                </html>
            `;

            win.document.write(html);
            win.document.close();
        }

        init();
    </script>
</body>
</html>
